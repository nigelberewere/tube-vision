# Cloudflare Pages configuration for VidVision
# Deploy with: npm run deploy (or via Cloudflare Dashboard)

name = "vid-vision"
compatibility_date = "2024-01-01"

# Pages configuration
pages_build_output_dir = "dist"

# Environment variables (set in Cloudflare Dashboard > Settings > Environment Variables)
# Required:
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - SESSION_SECRET
# - VITE_SUPABASE_URL
# - VITE_SUPABASE_ANON_KEY
# - SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
# - APP_URL (e.g., https://janso.studio)

[build]
command = "npm run build"
cwd = ""

[build.upload]
format = "modules"
dir = "dist"

# KV Namespaces for session storage (create via Cloudflare Dashboard)
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "your-kv-namespace-id"

# D1 Database for snapshots (alternative to SQLite)
# [[d1_databases]]
# binding = "DB"
# database_name = "vid-vision-db"
# database_id = "your-database-id"
